<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PhD Researcher — QUT</title>
<meta name="description" content="PhD Researcher in Computer Vision at Queensland University of Technology"/>
<!-- data.js is loaded first — it defines the DATA object used by this file -->
<script src="data.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════
   RESET & VARIABLES
═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1929; --navy-mid:#112236; --navy-lt:#1A3352;
  --bg:#F8F6F2; --surface:#EFECE6; --white:#FFF;
  --ink:#141210; --mid:#3A3835; --muted:#7A776F; --border:#DED9D0;
  --gold:#C07B28; --blue:#1B6CA8;
  --gold-dim:rgba(192,123,40,.12); --blue-dim:rgba(27,108,168,.09);
  --green:#0D6E4E;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --sb:272px;
}
html{scroll-behavior:smooth;font-size:15px}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);
  line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

/* ═══════════════════════════════════════
   LAYOUT
═══════════════════════════════════════ */
.wrap{display:flex;min-height:100vh}

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
#sb{
  width:var(--sb);flex-shrink:0;background:var(--navy);
  position:sticky;top:0;height:100vh;overflow-y:auto;
  display:flex;flex-direction:column;padding:2.2rem 1.6rem 1.8rem;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent
}
#sb::-webkit-scrollbar{width:3px}
#sb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}

.sb-photo{width:94px;height:94px;border-radius:50%;margin:0 auto 1.1rem;
  overflow:hidden;border:2.5px solid rgba(255,255,255,.15);
  background:var(--navy-lt);flex-shrink:0}
.sb-photo img{width:100%;height:100%;object-fit:cover;display:block}
.sb-initials{width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;font-family:var(--serif);font-size:2rem;
  color:rgba(255,255,255,.3)}

.sb-name{font-family:var(--serif);font-size:1.06rem;font-weight:600;
  color:#fff;text-align:center;line-height:1.25;margin-bottom:.2rem}
.sb-role{font-size:.7rem;text-align:center;color:rgba(255,255,255,.4);
  letter-spacing:.07em;text-transform:uppercase;margin-bottom:.1rem}
.sb-inst{font-size:.73rem;text-align:center;color:rgba(255,255,255,.28);margin-bottom:1.5rem}

.sb-div{height:1px;background:rgba(255,255,255,.08);margin:.3rem 0 .9rem}

.sb-nav{list-style:none;margin-bottom:1.3rem}
.sb-nav li+li{margin-top:1px}
.sb-nav a{display:flex;align-items:center;gap:.55rem;padding:.42rem .65rem;
  border-radius:3px;font-size:.8rem;color:rgba(255,255,255,.48);
  letter-spacing:.015em;transition:background .15s,color .15s;cursor:pointer}
.sb-nav a:hover,.sb-nav a.on{background:rgba(255,255,255,.08);color:#fff;text-decoration:none}
.sb-nav svg{width:12px;height:12px;fill:currentColor;flex-shrink:0;opacity:.7}

.sb-links{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-bottom:1.3rem}
.sb-lnk{display:inline-flex;align-items:center;gap:.3rem;
  padding:.27rem .52rem;border:1px solid rgba(255,255,255,.11);border-radius:3px;
  font-size:.68rem;font-weight:500;color:rgba(255,255,255,.4);transition:all .15s}
.sb-lnk svg{width:9px;height:9px;fill:currentColor}
.sb-lnk:hover{color:#fff;border-color:rgba(255,255,255,.35);text-decoration:none}

.sb-cv{display:block;margin-top:auto;padding:.6rem;background:var(--gold);
  color:#fff;text-align:center;border-radius:3px;font-size:.78rem;
  font-weight:600;letter-spacing:.04em;transition:opacity .15s}
.sb-cv:hover{opacity:.88;text-decoration:none;color:#fff}

/* ═══════════════════════════════════════
   MAIN
═══════════════════════════════════════ */
#main{flex:1;min-width:0}

/* ═══════════════════════════════════════
   SECTIONS
═══════════════════════════════════════ */
.sec{padding:3.6rem 4vw 3rem;border-bottom:1px solid var(--border)}
.sec:last-of-type{border-bottom:none}
.sec-hd{display:flex;align-items:baseline;gap:.9rem;margin-bottom:2rem}
.sec-hd h2{font-family:var(--serif);font-size:1.65rem;font-weight:600;
  color:var(--ink);line-height:1.1}
.sec-sub{font-size:.69rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
.sec-rule{flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent)}

/* ═══════════════════════════════════════
   ABOUT / HERO
═══════════════════════════════════════ */
#about{background:linear-gradient(155deg,#EFF1F8 0%,#F4F1EC 55%,#EBF0F5 100%);
  padding:3.8rem 4vw 3.4rem;border-bottom:1px solid var(--border)}
.h-eye{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold);font-weight:600;margin-bottom:.7rem}
.h-name{font-family:var(--serif);font-size:clamp(2rem,3.8vw,3.2rem);
  font-weight:700;line-height:1.05;color:var(--ink);margin-bottom:.3rem}
.h-tag{font-family:var(--serif);font-size:1.05rem;font-style:italic;
  color:var(--muted);margin-bottom:2rem}
.h-bio{font-size:.92rem;color:var(--mid);max-width:700px;line-height:1.9;margin-bottom:2.2rem}
.h-bio p+p{margin-top:.9rem}
.h-bio strong{color:var(--ink);font-weight:600}

.h-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;max-width:740px}
.info-lbl{font-size:.67rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);font-weight:600;margin-bottom:.7rem;
  padding-bottom:.35rem;border-bottom:1px solid var(--border)}
.sup-row{display:flex;gap:.5rem;margin-bottom:.55rem;align-items:flex-start}
.sup-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);
  flex-shrink:0;margin-top:8px}
.sup-name{font-size:.86rem;font-weight:600;color:var(--ink)}
.sup-dept{font-size:.78rem;color:var(--muted)}
.ri-cloud{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.6rem}
.ri-tag{padding:.26rem .7rem;background:var(--white);border:1px solid var(--border);
  border-radius:20px;font-size:.74rem;color:var(--mid);font-weight:500}

/* ═══════════════════════════════════════
   NEWS
═══════════════════════════════════════ */
.news-list{list-style:none}
.news-item{display:grid;grid-template-columns:88px 1fr;gap:1rem;
  padding:.9rem 0;border-bottom:1px solid var(--border)}
.news-item:last-child{border-bottom:none}
.n-date{font-size:.77rem;font-weight:600;color:var(--blue);white-space:nowrap;padding-top:1px}
.n-text{font-size:.875rem;color:var(--mid);line-height:1.6}
.n-text em{color:var(--ink);font-style:italic}
.n-text strong{color:var(--ink)}

/* ═══════════════════════════════════════
   PUBLICATIONS
═══════════════════════════════════════ */
.pub-grp{display:flex;align-items:center;gap:.8rem;font-size:.67rem;
  letter-spacing:.16em;text-transform:uppercase;color:var(--gold);
  font-weight:700;margin:1.6rem 0 .8rem}
.pub-grp::after{content:'';flex:1;height:1px;background:var(--border)}
.pub-list{list-style:none}
.pub-item{display:grid;grid-template-columns:36px 1fr;gap:1.1rem;
  padding:1.3rem 0;border-bottom:1px solid var(--border)}
.pub-item:last-child{border-bottom:none}
.pub-n{font-family:var(--serif);font-size:1.5rem;color:var(--border);
  line-height:1;padding-top:3px;text-align:right}
.pub-yr{display:inline-block;font-size:.66rem;font-weight:600;
  letter-spacing:.07em;color:var(--blue);background:var(--blue-dim);
  padding:.13rem .46rem;border-radius:2px;margin-bottom:.28rem}
.pub-title{font-size:.9rem;font-weight:600;color:var(--ink);
  line-height:1.45;margin-bottom:.28rem}
.pub-authors{font-size:.8rem;color:var(--muted);line-height:1.5;margin-bottom:.2rem}
.pub-authors strong{color:var(--mid)}
.pub-venue{font-size:.8rem;color:var(--mid);font-style:italic}
.pub-doi{color:var(--blue);font-style:normal;font-size:.75rem;
  font-weight:500;margin-left:.4rem}
.pub-award{display:inline-block;font-size:.67rem;font-weight:600;
  color:var(--gold);background:var(--gold-dim);
  padding:.1rem .44rem;border-radius:2px;margin-left:.4rem;font-style:normal}
.pub-kws{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.45rem}
.pub-kw{font-size:.68rem;color:var(--muted);background:var(--surface);
  border:1px solid var(--border);padding:.1rem .42rem;border-radius:2px}
.pub-footer{margin-top:1.2rem;font-size:.76rem;color:var(--muted)}

/* ═══════════════════════════════════════
   TIMELINE  (experience + education)
═══════════════════════════════════════ */
.tl{list-style:none;position:relative;padding-left:1.1rem}
.tl::before{content:'';position:absolute;left:0;top:8px;bottom:8px;
  width:1px;background:var(--border)}
.tl-item{position:relative;padding:0 0 2.2rem 1.9rem}
.tl-item:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-5px;top:7px;width:10px;height:10px;
  border-radius:50%;background:var(--blue);border:2px solid var(--bg)}
.tl-item:first-child .tl-dot{background:var(--gold)}
.tl-row{display:flex;justify-content:space-between;align-items:baseline;
  flex-wrap:wrap;gap:.2rem;margin-bottom:.15rem}
.tl-role{font-size:.97rem;font-weight:600;color:var(--ink)}
.tl-period{font-size:.75rem;font-weight:600;color:var(--gold);
  background:var(--gold-dim);padding:.12rem .44rem;border-radius:2px;flex-shrink:0}
.tl-org{font-size:.86rem;color:var(--mid);margin-bottom:.45rem}
.tl-note{font-size:.82rem;color:var(--muted);font-style:italic;margin-bottom:.5rem}
.tl-bul{list-style:none}
.tl-bul li{position:relative;padding:.22rem 0 .22rem 1.15rem;
  font-size:.85rem;color:var(--mid);line-height:1.55}
.tl-bul li::before{content:'—';position:absolute;left:0;
  color:var(--border);font-size:.8rem;top:.28rem}
.tl-bul li strong{color:var(--ink)}

/* ═══════════════════════════════════════
   AWARDS
═══════════════════════════════════════ */
.aw-list{list-style:none}
.aw-item{display:flex;gap:1rem;align-items:flex-start;
  padding:1rem 0;border-bottom:1px solid var(--border)}
.aw-item:last-child{border-bottom:none}
.aw-ico{font-size:1.1rem;flex-shrink:0;line-height:1.6}
.aw-name{font-size:.9rem;font-weight:600;color:var(--ink);line-height:1.35}
.aw-desc{font-size:.82rem;color:var(--muted);margin-top:.1rem}

/* ═══════════════════════════════════════
   SKILLS
═══════════════════════════════════════ */
.sk-row{display:grid;grid-template-columns:180px 1fr;padding:.8rem 0;
  border-bottom:1px solid var(--border);gap:1rem;align-items:start}
.sk-row:last-child{border-bottom:none}
.sk-cat{font-size:.82rem;font-weight:600;color:var(--ink);padding-top:.3rem}
.sk-tags{display:flex;flex-wrap:wrap;gap:.38rem}
.sk-tag{padding:.26rem .66rem;background:var(--surface);
  border:1px solid var(--border);border-radius:2px;
  font-size:.76rem;color:var(--mid);font-weight:500}

/* ═══════════════════════════════════════
   TEACHING
═══════════════════════════════════════ */
.tc-table{width:100%;border-collapse:collapse;font-size:.85rem}
.tc-table th{text-align:left;font-size:.67rem;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);font-weight:600;
  padding:0 .8rem .6rem 0;border-bottom:2px solid var(--border)}
.tc-table td{padding:.7rem .8rem .7rem 0;border-bottom:1px solid var(--border);
  vertical-align:top;color:var(--mid)}
.tc-table tr:last-child td{border-bottom:none}
.tc-table td:first-child{color:var(--ink);font-weight:500}

/* ═══════════════════════════════════════
   PROJECTS
═══════════════════════════════════════ */
.proj-legend{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.4rem;
  font-size:.73rem;color:var(--muted)}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.1rem}
.proj-card{background:var(--white);border:1px solid var(--border);border-radius:3px;
  padding:1.4rem;position:relative;overflow:hidden;
  transition:box-shadow .2s,transform .2s}
.proj-card:hover{box-shadow:0 6px 22px rgba(0,0,0,.08);transform:translateY(-2px)}
.proj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.proj-card[data-tag="PhD Research"]::before{background:var(--gold)}
.proj-card[data-tag="Research"]::before    {background:var(--blue)}
.proj-card[data-tag="Supervised"]::before  {background:var(--green)}
.proj-card[data-tag="Personal"]::before    {background:var(--muted)}
.proj-tag{font-size:.66rem;font-weight:700;letter-spacing:.09em;
  text-transform:uppercase;color:var(--muted);margin-bottom:.44rem}
.proj-card[data-tag="PhD Research"] .proj-tag{color:var(--gold)}
.proj-card[data-tag="Research"] .proj-tag    {color:var(--blue)}
.proj-card[data-tag="Supervised"] .proj-tag  {color:var(--green)}
.proj-title{font-size:.9rem;font-weight:600;color:var(--ink);
  line-height:1.35;margin-bottom:.44rem}
.proj-desc{font-size:.8rem;color:var(--muted);line-height:1.6;margin-bottom:.65rem}
.proj-techs{display:flex;flex-wrap:wrap;gap:.3rem}
.proj-tech{font-size:.67rem;background:var(--surface);
  border:1px solid var(--border);padding:.11rem .4rem;border-radius:2px;color:var(--mid)}
.proj-status{position:absolute;top:.8rem;right:.9rem;font-size:.61rem;
  font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.proj-status.published{color:var(--green)}
.proj-status.progress{color:var(--gold)}

/* ═══════════════════════════════════════
   SERVICE
═══════════════════════════════════════ */
.svc-grid{display:grid;grid-template-columns:115px 1fr}
.svc-lbl{font-size:.69rem;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted);
  padding:1rem 1.3rem 1rem 0;border-bottom:1px solid var(--border)}
.svc-ul{list-style:none;padding:1rem 0;border-bottom:1px solid var(--border)}
.svc-ul li{font-size:.86rem;color:var(--mid);padding:.22rem 0}
.svc-ul li::before{content:'— ';color:var(--border)}

/* ═══════════════════════════════════════
   CONTACT
═══════════════════════════════════════ */
.ct-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.5rem}
.ct-lbl{font-size:.67rem;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.ct-val{font-size:.88rem;color:var(--blue);font-weight:500;word-break:break-all}
.ct-val a{color:inherit}

/* ═══════════════════════════════════════
   FOOTER
═══════════════════════════════════════ */
footer{padding:1.4rem 4vw;text-align:center;font-size:.74rem;
  color:var(--muted);background:var(--surface);border-top:1px solid var(--border)}

/* ═══════════════════════════════════════
   FADE-IN ON SCROLL
═══════════════════════════════════════ */
.fade{opacity:0;transform:translateY(16px);
  transition:opacity .55s ease,transform .55s ease}
.fade.in{opacity:1;transform:none}

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media(max-width:820px){
  .wrap{flex-direction:column}
  #sb{width:100%;height:auto;position:relative;flex-direction:row;
    flex-wrap:wrap;align-items:center;padding:.9rem 1.2rem;gap:.6rem}
  .sb-photo{width:42px;height:42px;margin:0}
  .sb-name{font-size:.88rem;text-align:left}
  .sb-role,.sb-inst,.sb-div{display:none}
  .sb-nav{display:flex;flex-wrap:wrap;gap:.2rem;margin:0}
  .sb-nav li+li{margin:0}
  .sb-links{margin:0}
  .sb-cv{margin:0;padding:.4rem .8rem;font-size:.72rem}
  .h-grid,.h-grid>div+div{grid-template-columns:1fr}
  .sk-row{grid-template-columns:1fr}
  .svc-grid{grid-template-columns:1fr}
  .proj-grid{grid-template-columns:1fr}
  .pub-item{grid-template-columns:28px 1fr}
}
@media(max-width:480px){
  .sec{padding:2.5rem 5vw 2rem}
  .sb-nav{display:none}
}
</style>
</head>

<body>
<div class="wrap">

<!-- ═══ SIDEBAR ═══════════════════════════════════════════ -->
<aside id="sb"></aside>

<!-- ═══ MAIN ══════════════════════════════════════════════ -->
<main id="main">
  <section class="sec" id="about"></section>
  <section class="sec fade" id="news"><div class="sec-hd"><h2>News</h2><span class="sec-sub" id="n-cnt"></span><div class="sec-rule"></div></div></section>
  <section class="sec fade" id="publications"><div class="sec-hd"><h2>Publications</h2><span class="sec-sub" id="p-cnt"></span><div class="sec-rule"></div></div></section>
  <section class="sec fade" id="experience"><div class="sec-hd"><h2>Experience</h2><div class="sec-rule"></div></div></section>
  <section class="sec fade" id="education"><div class="sec-hd"><h2>Education</h2><div class="sec-rule"></div></div></section>
  <section class="sec fade" id="awards"><div class="sec-hd"><h2>Awards &amp; Scholarships</h2><div class="sec-rule"></div></div></section>
  <section class="sec fade" id="skills"><div class="sec-hd"><h2>Technical Skills</h2><div class="sec-rule"></div></div></section>
  <section class="sec fade" id="teaching"><div class="sec-hd"><h2>Teaching</h2><span class="sec-sub">2017–2025 · 1,200+ students</span><div class="sec-rule"></div></div></section>
  <section class="sec fade" id="projects"><div class="sec-hd"><h2>Projects</h2><div class="sec-rule"></div></div></section>
  <section class="sec fade" id="service"><div class="sec-hd"><h2>Service &amp; Talks</h2><div class="sec-rule"></div></div></section>
  <section class="sec fade" id="contact"><div class="sec-hd"><h2>Contact</h2><div class="sec-rule"></div></div></section>
  <footer id="ft"></footer>
</main>

</div>

<script>
/* ── tiny helpers ── */
const $  = id => document.getElementById(id);
const mk = (tag, cls, html) => {
  const e = document.createElement(tag);
  if (cls)  e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
};
const add = (p, c) => p.appendChild(c);
const ico = id => `<svg><use href="#i-${id}"/></svg>`;

/* ══════════════════════════════════════════
   PAGE TITLE & META — set from data
══════════════════════════════════════════ */
document.title = `${DATA.name} — ${DATA.degree}, QUT`;
document.querySelector('meta[name="description"]').content =
  `${DATA.name} – ${DATA.degree} in ${DATA.title} at ${DATA.affiliation}, ${DATA.location}.`;

/* ══════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════ */
function buildSidebar() {
  const sb = $('sb');

  // Photo
  const pw = mk('div','sb-photo');
  const img = document.createElement('img');
  img.src = DATA.photo; img.alt = DATA.name;
  img.onerror = () => pw.innerHTML = `<div class="sb-initials">${DATA.name[0]}</div>`;
  add(pw, img); add(sb, pw);

  add(sb, mk('div','sb-name', DATA.name));
  add(sb, mk('div','sb-role', DATA.degree));
  add(sb, mk('div','sb-inst', DATA.affiliation));
  add(sb, mk('div','sb-div'));

  // Navigation
  const navItems = [
    ['about','home','About'], ['news','news','News'],
    ['publications','pub','Publications'], ['experience','exp','Experience'],
    ['education','edu','Education'], ['awards','award','Awards'],
    ['skills','skill','Skills'], ['teaching','teach','Teaching'],
    ['projects','proj','Projects'], ['service','svc','Service'],
    ['contact','mail','Contact'],
  ];
  const ul = mk('ul','sb-nav');
  navItems.forEach(([id, icon, label]) => {
    const li = mk('li');
    const a  = mk('a', '', `${ico(icon)} ${label}`);
    a.dataset.sec = id;
    a.addEventListener('click', e => {
      e.preventDefault();
      $(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    add(li, a); add(ul, li);
  });
  add(sb, ul);
  add(sb, mk('div','sb-div'));

  // Social links
  const lmap = [
    ['scholar','sch','Scholar'],['github','gh','GitHub'],
    ['linkedin','li','LinkedIn'],['researchgate','rg','ResGate'],
    ['orcid','orcid','ORCID'],
  ];
  const ld = mk('div','sb-links');
  lmap.forEach(([key, icon, label]) => {
    if (!DATA.links[key]) return;
    const a = mk('a','sb-lnk', `${ico(icon)} ${label}`);
    a.href = DATA.links[key]; a.target = '_blank'; a.rel = 'noopener';
    add(ld, a);
  });
  add(sb, ld);

  // CV button
  const cv = mk('a','sb-cv','📄 Download CV');
  cv.href = DATA.cv_url; cv.target = '_blank'; cv.rel = 'noopener';
  add(sb, cv);
}

/* ══════════════════════════════════════════
   ABOUT
══════════════════════════════════════════ */
function buildAbout() {
  const paras = DATA.bio.trim().split('\n\n')
    .map(p => `<p>${p.replace(/\s+/g,' ').trim()}</p>`).join('');
  $('about').innerHTML = `
    <p class="h-eye">${DATA.affiliation} · ${DATA.location}</p>
    <h1 class="h-name">${DATA.name}</h1>
    <p class="h-tag">${DATA.degree} — ${DATA.title}</p>
    <div class="h-bio">${paras}</div>
    <div class="h-grid">
      // <div>
      //   <div class="info-lbl">PhD Supervisors</div>
      //   ${DATA.supervisors.map(s=>`
      //     <div class="sup-row"><div class="sup-dot"></div>
      //       <div><div class="sup-name">${s.name}</div>
      //       <div class="sup-dept">${s.dept} · ${s.inst}</div></div>
      //     </div>`).join('')}
      // </div>
      <div>
        <div class="info-lbl">Research Interests</div>
        <div class="ri-cloud">
          ${DATA.research_interests.map(r=>`<span class="ri-tag">${r}</span>`).join('')}
        </div>
      </div>
    </div>`;
}

/* ══════════════════════════════════════════
   NEWS
══════════════════════════════════════════ */
function buildNews() {
  $('n-cnt').textContent = `${DATA.news.length} updates`;
  const ul = mk('ul','news-list');
  DATA.news.forEach(n =>
    add(ul, mk('li','news-item',
      `<span class="n-date">${n.date}</span><span class="n-text">${n.text}</span>`)));
  add($('news'), ul);
}

/* ══════════════════════════════════════════
   PUBLICATIONS
══════════════════════════════════════════ */
function buildPublications() {
  const J = DATA.publications.filter(p=>p.type==='journal');
  const C = DATA.publications.filter(p=>p.type==='conference');
  $('p-cnt').textContent = `${J.length} journals · ${C.length} conferences`;
  const sec = $('publications');

  const buildGroup = (pubs, label, offset) => {
    add(sec, mk('p','pub-grp', label));
    const ul = mk('ul','pub-list');
    pubs.forEach((p,i) => {
      const doi   = p.doi ? `<a class="pub-doi" href="${p.doi}" target="_blank">↗ doi</a>` : '';
      const award = p.award ? `<span class="pub-award">${p.award}</span>` : '';
      const kws   = p.keywords?.length
        ? `<div class="pub-kws">${p.keywords.map(k=>`<span class="pub-kw">${k}</span>`).join('')}</div>` : '';
      add(ul, mk('li','pub-item',`
        <div class="pub-n">${String(offset+i+1).padStart(2,'0')}</div>
        <div>
          <span class="pub-yr">${p.year}</span>
          <div class="pub-title">${p.title}${award}</div>
          <div class="pub-authors">${p.authors}</div>
          <div class="pub-venue"><em>${p.venue}</em>${doi}</div>
          ${kws}
        </div>`));
    });
    add(sec, ul);
  };

  buildGroup(J, 'Journal Articles', 0);
  buildGroup(C, 'Conference Papers', J.length);
  add(sec, mk('p','pub-footer',
    `* Corresponding Author &nbsp;·&nbsp;
     <a href="${DATA.links.scholar}" target="_blank">Full list on Google Scholar</a>`));
}

/* ══════════════════════════════════════════
   EXPERIENCE
══════════════════════════════════════════ */
function buildExperience() {
  const ul = mk('ul','tl');
  DATA.experience.forEach(e => {
    add(ul, mk('li','tl-item',`
      <div class="tl-dot"></div>
      <div class="tl-row">
        <span class="tl-role">${e.role}</span>
        <span class="tl-period">${e.period}</span>
      </div>
      <div class="tl-org">${e.org} · ${e.loc}</div>
      <ul class="tl-bul">${e.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>`));
  });
  add($('experience'), ul);
}

/* ══════════════════════════════════════════
   EDUCATION
══════════════════════════════════════════ */
function buildEducation() {
  const ul = mk('ul','tl');
  DATA.education.forEach(e => {
    const field = e.field ? ` — ${e.field}` : '';
    add(ul, mk('li','tl-item',`
      <div class="tl-dot"></div>
      <div class="tl-row">
        <span class="tl-role">${e.degree}${field}</span>
        <span class="tl-period">${e.period}</span>
      </div>
      <div class="tl-org">${e.inst} · ${e.loc}</div>
      <div class="tl-note">${e.note}</div>`));
  });
  add($('education'), ul);
}

/* ══════════════════════════════════════════
   AWARDS
══════════════════════════════════════════ */
function buildAwards() {
  const ul = mk('ul','aw-list');
  DATA.awards.forEach(a =>
    add(ul, mk('li','aw-item',`
      <div class="aw-ico">${a.icon}</div>
      <div><div class="aw-name">${a.title}</div>
      <div class="aw-desc">${a.desc}</div></div>`)));
  add($('awards'), ul);
}

/* ══════════════════════════════════════════
   SKILLS
══════════════════════════════════════════ */
function buildSkills() {
  const wrap = mk('div');
  DATA.skills.forEach(s => {
    const row = mk('div','sk-row');
    row.innerHTML = `<div class="sk-cat">${s.cat}</div>
      <div class="sk-tags">${s.items.map(i=>`<span class="sk-tag">${i}</span>`).join('')}</div>`;
    add(wrap, row);
  });
  add($('skills'), wrap);
}

/* ══════════════════════════════════════════
   TEACHING
══════════════════════════════════════════ */
function buildTeaching() {
  const sec = $('teaching');
  add(sec, mk('p','',`<p style="font-size:.88rem;color:var(--mid);margin-bottom:1.6rem;max-width:640px">
    Between 2017 and 2025 I taught <strong>20+ undergraduate courses</strong> to
    <strong>1,200+ students</strong> and supervised <strong>25+ final-year thesis projects</strong>,
    several of which resulted in peer-reviewed publications.</p>`));
  const t = mk('table','tc-table');
  t.innerHTML = `<thead><tr>
    <th>Course</th><th>Institution</th><th>Period</th><th>Notes</th></tr></thead>
    <tbody>${DATA.teaching.map(r=>`<tr>
      <td>${r.course}</td><td>${r.inst}</td><td>${r.period}</td>
      <td style="color:var(--muted)">${r.note}</td></tr>`).join('')}</tbody>`;
  add(sec, t);
}

/* ══════════════════════════════════════════
   PROJECTS
══════════════════════════════════════════ */
function buildProjects() {
  const sec = $('projects');
  add(sec, mk('div','proj-legend',`
    <span><span style="color:var(--gold);font-weight:700">●</span> PhD Research</span>
    <span><span style="color:var(--blue);font-weight:700">●</span> Research</span>
    <span><span style="color:var(--green);font-weight:700">●</span> Supervised</span>
    <span><span style="color:var(--muted);font-weight:700">●</span> Personal</span>`));
  const grid = mk('div','proj-grid');
  DATA.projects.forEach(p => {
    const sc = p.status==='In Progress' ? 'progress' : p.status==='Published' ? 'published' : '';
    const card = mk('div','proj-card');
    card.dataset.tag = p.tag;
    card.innerHTML = `
      ${p.status ? `<div class="proj-status ${sc}">${p.status}</div>` : ''}
      <div class="proj-tag">${p.tag}</div>
      <div class="proj-title">${p.title}</div>
      <div class="proj-desc">${p.desc}</div>
      <div class="proj-techs">${(p.tech||[]).map(t=>`<span class="proj-tech">${t}</span>`).join('')}</div>`;
    add(grid, card);
  });
  add(sec, grid);
  add(sec, mk('p','',`<p style="font-size:.77rem;color:var(--muted);margin-top:1.3rem">
    Code on <a href="${DATA.links.github}" target="_blank">GitHub</a></p>`));
}

/* ══════════════════════════════════════════
   SERVICE
══════════════════════════════════════════ */
function buildService() {
  const sec = $('service');
  const g = mk('div','svc-grid');
  add(g, mk('div','svc-lbl','Peer Review'));
  const rv = mk('ul','svc-ul');
  DATA.service.reviewing.forEach(r => add(rv, mk('li','',r)));
  add(g, rv);
  add(g, mk('div','svc-lbl','Invited Talks'));
  const tv = mk('ul','svc-ul');
  DATA.service.talks.forEach(t =>
    add(tv, mk('li','',`<strong>${t.title}</strong> — ${t.venue}`)));
  add(g, tv);
  add(sec, g);
}

/* ══════════════════════════════════════════
   CONTACT
══════════════════════════════════════════ */
function buildContact() {
  const sec = $('contact');
  const g = mk('div','ct-grid');
  [
    ['University Email', `<a href="mailto:${DATA.email_uni}">${DATA.email_uni}</a>`],
    ['Personal Email',   `<a href="mailto:${DATA.email_personal}">${DATA.email_personal}</a>`],
    ['Phone',            DATA.phone],
    ['Location',         DATA.location],
    ['Google Scholar',   `<a href="${DATA.links.scholar}" target="_blank">View Profile ↗</a>`],
    ['ORCID',            `<a href="${DATA.links.orcid}" target="_blank">${DATA.links.orcid.split('/').pop()}</a>`],
  ].forEach(([l,v]) =>
    add(g, mk('div','',`<div class="ct-lbl">${l}</div><div class="ct-val">${v}</div>`)));
  add(sec, g);
}

/* ══════════════════════════════════════════
   FOOTER
══════════════════════════════════════════ */
function buildFooter() {
  $('ft').innerHTML = `© 2026 <strong>${DATA.name}</strong> · ${DATA.affiliation} ·
    Built with GitHub Pages · <a href="#about">Back to top ↑</a>`;
}

/* ══════════════════════════════════════════
   ACTIVE NAV HIGHLIGHT
══════════════════════════════════════════ */
function initNav() {
  const links = document.querySelectorAll('.sb-nav a[data-sec]');
  const secs  = [...document.querySelectorAll('#main section[id]')];
  const obs   = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting)
        links.forEach(l => l.classList.toggle('on', l.dataset.sec === e.target.id));
    });
  }, { rootMargin: '-30% 0px -60% 0px' });
  secs.forEach(s => obs.observe(s));
}

/* ══════════════════════════════════════════
   SCROLL FADE-IN
══════════════════════════════════════════ */
function initFade() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); obs.unobserve(e.target); }});
  }, { rootMargin: '0px 0px -80px 0px' });
  document.querySelectorAll('.fade').forEach(el => obs.observe(el));
}

/* ══════════════════════════════════════════
   INIT — build everything
══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  buildSidebar();
  buildAbout();
  buildNews();
  buildPublications();
  buildExperience();
  buildEducation();
  buildAwards();
  buildSkills();
  buildTeaching();
  buildProjects();
  buildService();
  buildContact();
  buildFooter();
  initNav();
  initFade();
});
</script>
</body>
</html>
